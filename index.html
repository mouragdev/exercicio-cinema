<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./css/style.css">

    <title>Exercicio - Cinema</title>
</head>

<body>
    <main>
        <article>
                <h1>Tempo do Filme</h1>
                <p class="subtitle">Descubra quantas horas e minutos tem um determinado filme.</p>


                <label for="titulo">Digite o nome do filme:</label>
                <input type="text" name="titulo" id="titulo" placeholder="Nome do Filme" required>

                <label for="duracao">Digite quantos minutos tem o filme:</label>
                <input type="number" name="duracao" id="duracao" placeholder="Tempo em Minutos" required>

                <button onclick="calcularTempo()">Calcular Tempo</button>

                <p id="resultado-nome"></p>
                <p id="resultado-tempo"></p>


        </article>
    </main>




    <script src="./js/script.js"></script>
</body>

</html>
